workflows:

  # ──────────────────────────────────────────────────────────
  # 1) TestFlight Deploy — main'e push veya v* tag'inde çalışır
  # ──────────────────────────────────────────────────────────
  testflight-deploy:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.getastara.app
      groups:
        - astara_credentials
      vars:
        BUNDLE_ID: "com.getastara.app"
        XCODE_SCHEME: "Astara"

    cache:
      cache_paths:
        - ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
        - $CM_BUILD_DIR/.derivedData/SourcePackages

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: "v*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Create xcconfig files
        script: |
          cp Astara/App/Configuration/Debug.xcconfig.example \
             Astara/App/Configuration/Debug.xcconfig
          # Inject real secrets from Codemagic environment group (astara_credentials)
          sed -e "s/REPLACE_WITH_REAL_KEY/${VPS_API_KEY}/" \
              -e "s/REPLACE_WITH_REAL_USERNAME/${GEONAMES_USERNAME}/" \
              Astara/App/Configuration/Release.xcconfig.example \
              > Astara/App/Configuration/Release.xcconfig

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Allow Swift Macros
        script: |
          defaults write com.apple.dt.Xcode \
            IDESkipMacroFingerprintValidation -bool YES

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project Astara.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -derivedDataPath $CM_BUILD_DIR/.derivedData

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates

          # Profili base64 env var'dan decode et ve kur
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision \
            > /tmp/decoded_profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" \
            /tmp/decoded_profile.plist)
          echo "Profile UUID: $UUID"
          cp /tmp/profile.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> $CM_ENV

      - name: Archive
        script: |
          xcodebuild archive \
            -project Astara.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Astara.xcarchive" \
            -derivedDataPath "$CM_BUILD_DIR/.derivedData" \
            DEVELOPMENT_TEAM="CL4KZ4JZDQ" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            "CODE_SIGN_STYLE[sdk=macosx*]=Automatic" \
            "PROVISIONING_PROFILE_SPECIFIER[sdk=macosx*]=" \
            "CODE_SIGNING_REQUIRED[sdk=macosx*]=NO" \
            "CODE_SIGNING_ALLOWED[sdk=macosx*]=NO"

      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>CL4KZ4JZDQ</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.getastara.app</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Astara.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $CM_BUILD_DIR/Astara.xcarchive/**/*.dSYM

    publishing:
      email:
        recipients:
          - kuntayerkus@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        beta_groups:
          - Astara Testers

  # ──────────────────────────────────────────────────────────
  # 2) Build & Test
  # ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    instance_type: mac_mini_m2
    max_build_duration: 40

    environment:
      xcode: latest

    cache:
      cache_paths:
        - ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
        - $CM_BUILD_DIR/.derivedData/SourcePackages

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
      cancel_previous_builds: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Create xcconfig files
        script: |
          cp Astara/App/Configuration/Debug.xcconfig.example \
             Astara/App/Configuration/Debug.xcconfig
          cp Astara/App/Configuration/Release.xcconfig.example \
             Astara/App/Configuration/Release.xcconfig

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Resolve SPM dependencies

        script: |
          xcodebuild -resolvePackageDependencies \
            -project Astara.xcodeproj \
            -scheme Astara \
            -derivedDataPath $CM_BUILD_DIR/.derivedData

      - name: Build
        script: |
          xcodebuild build \
            -project Astara.xcodeproj \
            -scheme Astara \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -derivedDataPath $CM_BUILD_DIR/.derivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        script: |
          xcodebuild test \
            -project Astara.xcodeproj \
            -scheme AstaraTests \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -derivedDataPath $CM_BUILD_DIR/.derivedData \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath $CM_BUILD_DIR/TestResults

    artifacts:
      - $CM_BUILD_DIR/TestResults/**

  # ──────────────────────────────────────────────────────────
  # 3) SwiftLint
  # ──────────────────────────────────────────────────────────
  swiftlint:
    name: SwiftLint
    instance_type: mac_mini_m2
    max_build_duration: 10

    environment:
      xcode: latest

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Run SwiftLint
        script: |
          brew install swiftlint
          swiftlint lint --reporter json \
            > $CM_BUILD_DIR/swiftlint_report.json || true

    artifacts:
      - $CM_BUILD_DIR/swiftlint_report.json
