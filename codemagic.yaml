workflows:

  # ──────────────────────────────────────────────────────────
  # 1) TestFlight Deploy — main'e push veya v* tag'inde çalışır
  # ──────────────────────────────────────────────────────────
  testflight-deploy:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AstaraASC   # Codemagic Settings → Integrations → App Store Connect

    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: "com.getastara.app"
        XCODE_SCHEME: "Astara"

    cache:
      cache_paths:
        - ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
        - $CM_BUILD_DIR/.derivedData/SourcePackages

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: "v*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Create xcconfig files
        script: |
          cp Astara/App/Configuration/Debug.xcconfig.example \
             Astara/App/Configuration/Debug.xcconfig
          cp Astara/App/Configuration/Release.xcconfig.example \
             Astara/App/Configuration/Release.xcconfig

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Allow Swift Macros
        script: |
          defaults write com.apple.dt.Xcode \
            IDESkipMacroFingerprintValidation -bool YES

      - name: Set up code signing
        script: |
          # Sertifikayı import et
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/distribution.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/distribution.p12 \
            --certificate-password "$CERTIFICATE_P12_PASSWORD"

          # Provisioning profile'ı yerleştir
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/Astara_AppStore.mobileprovision

      - name: Set build number from TestFlight
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number \
            "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST + 1))

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project Astara.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -derivedDataPath $CM_BUILD_DIR/.derivedData

      - name: Create export options
        script: |
          /usr/libexec/PlistBuddy -c "Clear dict" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /Users/builder/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.getastara.app string Astara_AppStore" /Users/builder/export_options.plist
          echo "=== Export Options ==="
          cat /Users/builder/export_options.plist

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/Astara.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - kuntayerkus@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        beta_groups:
          - Astara Testers

  # ──────────────────────────────────────────────────────────
  # 2) Build & Test — main + develop branch'e push ve PR'larda
  # ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    instance_type: mac_mini_m2
    max_build_duration: 40

    environment:
      xcode: 16.2

    cache:
      cache_paths:
        - ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
        - $CM_BUILD_DIR/.derivedData/SourcePackages

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
      cancel_previous_builds: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Create xcconfig files
        script: |
          cp Astara/App/Configuration/Debug.xcconfig.example \
             Astara/App/Configuration/Debug.xcconfig
          cp Astara/App/Configuration/Release.xcconfig.example \
             Astara/App/Configuration/Release.xcconfig

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project Astara.xcodeproj \
            -scheme Astara \
            -derivedDataPath $CM_BUILD_DIR/.derivedData

      - name: Build
        script: |
          xcodebuild build \
            -project Astara.xcodeproj \
            -scheme Astara \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -derivedDataPath $CM_BUILD_DIR/.derivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        script: |
          xcodebuild test \
            -project Astara.xcodeproj \
            -scheme AstaraTests \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -derivedDataPath $CM_BUILD_DIR/.derivedData \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath $CM_BUILD_DIR/TestResults

    artifacts:
      - $CM_BUILD_DIR/TestResults/**

  # ──────────────────────────────────────────────────────────
  # 3) SwiftLint — her branch'e push'ta çalışır
  # ──────────────────────────────────────────────────────────
  swiftlint:
    name: SwiftLint
    instance_type: mac_mini_m2
    max_build_duration: 10

    environment:
      xcode: 16.2

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Run SwiftLint
        script: |
          brew install swiftlint
          swiftlint lint --reporter json \
            > $CM_BUILD_DIR/swiftlint_report.json || true

    artifacts:
      - $CM_BUILD_DIR/swiftlint_report.json
