name: Build Blog

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**'
      - 'data/blog-posts.json'
      - 'data/daily-horoscope.json'
      - 'data/planet-positions.json'
      - 'scripts/build-blog.js'
      - 'scripts/build-data-inject.js'
      - 'scripts/build-energy.js'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run build scripts
        run: |
          node scripts/build-energy.js
          node scripts/build-data-inject.js
          node scripts/build-blog.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ data/blog-posts.json index.html sitemap.xml robots.txt
          git diff --staged --quiet || git commit -m "build: auto-rebuild blog [skip ci]"
          git push
