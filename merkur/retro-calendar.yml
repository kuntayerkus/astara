name: Yıllık Retrograd Takvimi Güncelleme

on:
  schedule:
    # 1 Ocak 06:00 UTC — yeni yılın retrograd takvimini üret
    - cron: '0 6 1 1 *'
    # 1 Temmuz 06:00 UTC — yılın ikinci yarısını teyit et
    - cron: '0 6 1 7 *'
  workflow_dispatch:
    # GitHub UI'dan manuel tetikleme (örn. ilk kurulum, yıl ortası güncelleme)
    inputs:
      years:
        description: 'Taranacak yıllar (virgülle ayrılmış, örn: 2026,2027)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-retro-calendar:
    name: VPS tarama → retro-calendar.json → deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30   # VPS çağrıları ~200-400 adet, toplamda 3-5 dk

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Node.js 24 kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Retrograd takvimini üret
        env:
          VPS_URL: ${{ secrets.VPS_URL }}
          VPS_SECRET: ${{ secrets.VPS_SECRET }}
        run: |
          if [ -n "${{ github.event.inputs.years }}" ]; then
            node scripts/generate-retro-calendar.js --years=${{ github.event.inputs.years }}
          else
            node scripts/generate-retro-calendar.js
          fi

      - name: JSON değiştiyse commit at
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/retro-calendar.json
          git diff --staged --quiet \
            && echo "⏭️  Retrograd verisi değişmedi, commit atlanıyor." \
            || git commit -m "chore: retrograd takvimi güncellendi $(date -u +%Y-%m-%d)"

      - name: Değişikliği push et (Vercel otomatik deploy eder)
        run: git push
