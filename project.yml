name: Astara

options:
  bundleIdPrefix: com.getastara
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Astara:
    type: application
    platform: iOS
    sources:
      - path: Astara
        excludes:
          - Resources/Fonts/README.md
          - Resources/Lottie/README.md
          - Resources/Assets.xcassets
          - Resources/Fonts
          - Resources/Lottie
      - path: Astara/Resources/Assets.xcassets
        buildPhase: resources
      - path: Astara/Resources/Fonts
        buildPhase: resources
        type: folder
      - path: Astara/Resources/Lottie
        buildPhase: resources
        type: folder
    dependencies:
      - package: ComposableArchitecture
      - package: KeychainAccess
      - package: Lottie
      - package: Supabase
        product: Supabase
      - target: AstaraWidget
        embed: true
    entitlements:
      path: Astara/Astara.entitlements
      properties:
        aps-environment: production
        com.apple.security.application-groups:
          - group.com.getastara.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getastara.app
        DEVELOPMENT_TEAM: CL4KZ4JZDQ
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        VERSIONING_SYSTEM: "apple-generic"
        INFOPLIST_KEY_CFBundleDisplayName: Astara
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Astara needs your location to find your birth city."
        INFOPLIST_KEY_NSCameraUsageDescription: "Astara uses your camera to scan QR codes and add friends."
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          CODE_SIGN_STYLE: Automatic
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: Astara_AppStore
    info:
      path: Astara/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon
        API_BASE_URL: $(API_BASE_URL)
        VPS_URL: $(VPS_URL)
        VPS_API_KEY: $(VPS_API_KEY)
        GEONAMES_USERNAME: $(GEONAMES_USERNAME)
        GEMINI_API_KEY: $(GEMINI_API_KEY)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - CormorantGaramond-Bold.ttf
          - CormorantGaramond-SemiBold.ttf
          - CormorantGaramond-Medium.ttf
          - CormorantGaramond-Regular.ttf
          - PlusJakartaSans-Bold.ttf
          - PlusJakartaSans-SemiBold.ttf
          - PlusJakartaSans-Medium.ttf
          - PlusJakartaSans-Regular.ttf
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - astara
        UIBackgroundModes:
          - remote-notification
          - fetch

  AstaraWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: AstaraWidget
      # Keep the widget target slim — we only reuse the design tokens + the
      # zodiac sign enum. Everything dynamic goes through WidgetSnapshot which
      # the host app writes to the shared App Group container.
      - path: Astara/DesignSystem/Theme/AstaraColors.swift
      - path: Astara/DesignSystem/Theme/AstaraTypography.swift
      - path: Astara/DesignSystem/Theme/AstaraSpacing.swift
      - path: Astara/Core/Models/ZodiacSign.swift
      - path: Astara/Core/Models/Planet.swift
      - path: Astara/Core/Services/WidgetSnapshot.swift
      - path: Astara/App/Configuration/AppConstants.swift
      - path: Astara/Resources/Fonts
        buildPhase: resources
        type: folder
    entitlements:
      path: AstaraWidget/AstaraWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getastara.app.widget
        DEVELOPMENT_TEAM: CL4KZ4JZDQ
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        VERSIONING_SYSTEM: "apple-generic"
        INFOPLIST_KEY_CFBundleDisplayName: Astara
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
    info:
      path: AstaraWidget/Info.plist
      properties:
        CFBundleDisplayName: Astara
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIAppFonts:
          - CormorantGaramond-SemiBold.ttf
          - CormorantGaramond-Medium.ttf
          - PlusJakartaSans-SemiBold.ttf
          - PlusJakartaSans-Regular.ttf

  AstaraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Astara
